<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor OCR</title>
    <!-- Incluimos Tesseract.js desde un CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 800px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2.2rem;
            color: var(--primary-color);
        }

        p {
            margin: 0;
            color: var(--text-secondary);
        }

        /* Zona de arrastrar y soltar */
        .drop-zone {
            border: 2px dashed var(--primary-color);
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            background-color: #eff6ff;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background-color: #e0e7ff;
            border-color: var(--primary-hover);
        }

        .drop-zone.has-image {
            padding: 0;
            border-style: solid;
            background-color: transparent;
        }

        .drop-zone__prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            pointer-events: none;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary-color);
        }

        .file-input {
            display: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        /* Vista previa de la imagen */
        .preview-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .preview-container.active {
            display: flex;
        }

        .image-preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            background-color: #f8fafc;
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        /* Estado de progreso */
        .status-container {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .status-container.active {
            display: flex;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* Resultados */
        .result-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .result-container.active {
            display: flex;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h3 {
            margin: 0;
            font-size: 1.25rem;
        }

        .text-output {
            width: 100%;
            min-height: 200px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            resize: vertical;
            line-height: 1.5;
            background-color: #f9fafb;
            box-sizing: border-box;
        }

        .text-output:focus {
            outline: 2px solid var(--primary-color);
            background-color: white;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--success-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Language selector */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        select {
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            outline: none;
        }
        select:focus {
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Motor OCR</h1>
            <p>Extrae texto de tus imágenes instantáneamente sin enviarlas a ningún servidor.</p>
        </header>

        <!-- Controles globales -->
        <div class="controls">
            <div>
                <label for="lang-select">Idioma del texto:</label>
                <select id="lang-select">
                    <option value="spa">Español</option>
                    <option value="eng">Inglés</option>
                    <option value="spa+eng">Español + Inglés</option>
                </select>
            </div>
        </div>

        <!-- Zona para cargar imagen -->
        <div class="drop-zone" id="drop-zone">
            <div class="drop-zone__prompt" id="drop-prompt">
                <span class="upload-icon">📁</span>
                <span style="font-size: 1.2rem; font-weight: 500;">Haz clic o arrastra una imagen aquí</span>
                <span style="font-size: 0.85rem; color: #6b7280;">Soporta PNG, JPG, JPEG</span>
            </div>
            <img src="" alt="Vista previa" class="image-preview" id="image-preview">
            <input type="file" name="file" id="file-input" class="file-input" accept="image/jpeg, image/png, image/jpg">
        </div>

        <!-- Controles de acción y progreso -->
        <div class="preview-container" id="preview-controls">
            <button class="btn" id="btn-process">
                <span>🔍 Extraer Texto (OCR)</span>
            </button>
            <button class="btn" id="btn-reset" style="background-color: #ef4444;">
                <span>✕ Cancelar / Otra imagen</span>
            </button>
        </div>

        <div class="status-container" id="status-container">
            <div class="status-text">
                <span id="status-message">Inicializando motor OCR...</span>
                <span id="status-percentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- Resultados -->
        <div class="result-container" id="result-container">
            <div class="result-header">
                <h3>Texto Extraído:</h3>
                <button class="btn" id="btn-copy">
                    <span>📋 Copiar Texto</span>
                </button>
            </div>
            <textarea id="text-output" class="text-output" placeholder="El texto extraído aparecerá aquí..."></textarea>
        </div>
    </div>

    <div class="toast" id="toast">✅ Texto copiado al portapapeles</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Elementos del DOM
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const dropPrompt = document.getElementById('drop-prompt');
            const imagePreview = document.getElementById('image-preview');
            
            const previewControls = document.getElementById('preview-controls');
            const btnProcess = document.getElementById('btn-process');
            const btnReset = document.getElementById('btn-reset');
            
            const statusContainer = document.getElementById('status-container');
            const statusMessage = document.getElementById('status-message');
            const statusPercentage = document.getElementById('status-percentage');
            const progressBar = document.getElementById('progress-bar');
            
            const resultContainer = document.getElementById('result-container');
            const textOutput = document.getElementById('text-output');
            const btnCopy = document.getElementById('btn-copy');
            const langSelect = document.getElementById('lang-select');
            
            let currentFile = null;

            // --- MANEJO DE ARCHIVOS ---

            // Clic en la zona activa el input oculto
            dropZone.addEventListener('click', () => {
                if (!currentFile) {
                    fileInput.click();
                }
            });

            // Cambio en el input de archivo
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFile(e.target.files[0]);
                }
            });

            // Arrastrar y soltar
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                if(!currentFile) dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                
                if (e.dataTransfer.files.length && !currentFile) {
                    const file = e.dataTransfer.files[0];
                    if (file.type.startsWith('image/')) {
                        fileInput.files = e.dataTransfer.files; // Sincronizar input
                        handleFile(file);
                    } else {
                        alert('Por favor, selecciona un archivo de imagen válido.');
                    }
                }
            });

            // Procesar el archivo seleccionado
            function handleFile(file) {
                currentFile = file;
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    // Mostrar imagen
                    imagePreview.src = e.target.result;
                    imagePreview.classList.add('active');
                    dropPrompt.style.display = 'none';
                    dropZone.classList.add('has-image');
                    dropZone.style.cursor = 'default';
                    
                    // Mostrar controles
                    previewControls.classList.add('active');
                    resultContainer.classList.remove('active');
                    statusContainer.classList.remove('active');
                    
                    // Mostrar botón reset
                    const existingBtn = document.getElementById('btn-reset-top');
                    if (!existingBtn) {
                        const resetBtn = document.createElement('button');
                        resetBtn.innerHTML = '✕';
                        resetBtn.id = 'btn-reset-top';
                        resetBtn.style.cssText = 'position:absolute; top:10px; right:10px; background:red; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; display:flex; justify-content:center; align-items:center; opacity:0.8;';
                        resetBtn.onclick = (e) => {
                            e.stopPropagation(); // Evitar click en dropZone
                            btnReset.click();
                        };
                        resetBtn.onmouseover = () => resetBtn.style.opacity = '1';
                        resetBtn.onmouseout = () => resetBtn.style.opacity = '0.8';
                        dropZone.appendChild(resetBtn);
                    } else {
                        existingBtn.style.display = 'flex';
                    }
                };
                
                reader.readAsDataURL(file);
            }

            // Resetear interfaz
            btnReset.addEventListener('click', () => {
                currentFile = null;
                fileInput.value = '';
                imagePreview.src = '';
                imagePreview.classList.remove('active');
                dropPrompt.style.display = 'flex';
                dropZone.classList.remove('has-image');
                dropZone.style.cursor = 'pointer';
                
                const existingBtn = document.getElementById('btn-reset-top');
                if(existingBtn) existingBtn.style.display = 'none';
                
                previewControls.classList.remove('active');
                resultContainer.classList.remove('active');
                statusContainer.classList.remove('active');
                textOutput.value = '';
                progressBar.style.width = '0%';
            });

            // --- LÓGICA OCR (Tesseract.js) ---

            btnProcess.addEventListener('click', async () => {
                if (!currentFile) return;

                // Preparar UI para carga
                btnProcess.disabled = true;
                btnReset.disabled = true;
                const existingBtnTop = document.getElementById('btn-reset-top');
                if(existingBtnTop) existingBtnTop.style.display = 'none';
                
                statusContainer.classList.add('active');
                resultContainer.classList.remove('active');
                langSelect.disabled = true;
                
                const selectedLang = langSelect.value;
                const imageUrl = imagePreview.src;

                try {
                    // Actualización de progreso inyectada
                    const logger = m => {
                        console.log(m);
                        if (m.status === 'recognizing text') {
                            const prog = Math.round(m.progress * 100);
                            statusMessage.textContent = 'Analizando texto...';
                            statusPercentage.textContent = `${prog}%`;
                            progressBar.style.width = `${prog}%`;
                        } else {
                            statusMessage.textContent = 'Preparando motor (' + m.status + ')...';
                            statusPercentage.textContent = '';
                        }
                    };

                    // Ejecutar OCR
                    const result = await Tesseract.recognize(
                        imageUrl,
                        selectedLang,
                        { logger: logger }
                    );

                    // Mostrar resultado
                    textOutput.value = result.data.text;
                    resultContainer.classList.add('active');
                    
                    // Scroll suave hacia los resultados
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                } catch (error) {
                    console.error('Error OCR:', error);
                    alert('Hubo un error al procesar la imagen. Intenta con otra imagen más clara.');
                    statusMessage.textContent = 'Error al procesar la imagen';
                    progressBar.style.backgroundColor = '#ef4444';
                } finally {
                    btnProcess.disabled = false;
                    btnReset.disabled = false;
                    const existingBtnTop = document.getElementById('btn-reset-top');
                    if(existingBtnTop) existingBtnTop.style.display = 'flex';
                    langSelect.disabled = false;
                    // Resetear barra por estética tras finalizar
                    setTimeout(() => {
                        if(!textOutput.value) progressBar.style.width = '0%';
                    }, 1000);
                }
            });

            // --- UTILIDADES ---

            // Copiar al portapapeles
            btnCopy.addEventListener('click', () => {
                textOutput.select();
                document.execCommand('copy');
                
                // Mostrar Toast
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            });
        });
    </script>
</body>
</html>
